{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stock-intelligence.fullname" . }}-default-deny
  namespace: {{ .Values.namespace.name }}
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stock-intelligence.fullname" . }}-allow-dns
  namespace: {{ .Values.namespace.name }}
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stock-intelligence.fullname" . }}-frontend
  namespace: {{ .Values.namespace.name }}
spec:
  podSelector:
    matchLabels:
      {{- include "stock-intelligence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.gatewayNamespace }}
      ports:
        - { protocol: TCP, port: 3000 }
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "stock-intelligence.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: backend
      ports:
        - { protocol: TCP, port: 8000 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stock-intelligence.fullname" . }}-backend
  namespace: {{ .Values.namespace.name }}
spec:
  podSelector:
    matchLabels:
      {{- include "stock-intelligence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "stock-intelligence.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: frontend
      ports:
        - { protocol: TCP, port: 8000 }
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "stock-intelligence.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgres
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stock-intelligence.fullname" . }}-postgres
  namespace: {{ .Values.namespace.name }}
spec:
  podSelector:
    matchLabels:
      {{- include "stock-intelligence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: ["backend", "pipeline"]
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stock-intelligence.fullname" . }}-pipeline-egress
  namespace: {{ .Values.namespace.name }}
spec:
  podSelector:
    matchLabels:
      {{- include "stock-intelligence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pipeline
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "stock-intelligence.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgres
      ports:
        - { protocol: TCP, port: 5432 }
    - ports:
        - { protocol: TCP, port: 80 }
        - { protocol: TCP, port: 443 }
{{- end }}

