{{- if and (not .Values.secrets.existingSecret) .Values.secrets.createPlaceholder }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stock-intelligence.secretName" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "stock-intelligence.labels" . | nindent 4 }}
  annotations:
    stock-intelligence.dev/placeholder: "replace-before-nonlocal-use"
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresDatabase | quote }}
  SESSION_SECRET: {{ .Values.secrets.sessionSecret | quote }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
{{- end }}

