namespace:
  create: true
  name: stock-intelligence
  labels:
    app.kubernetes.io/part-of: stock-intelligence
  istioInjection: false

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/xmaeltht/stock-intelligent-frontend
    tag: "1884c26b1c795cd85799f2601982217528c08e83" # gitops-managed
    pullPolicy: IfNotPresent
    revision: "2026-07-13-06"
  service:
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/xmaeltht/stock-intelligent-backend
    tag: "1884c26b1c795cd85799f2601982217528c08e83" # gitops-managed
    pullPolicy: IfNotPresent
    revision: "2026-07-13-06"
  service:
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: "1"
      memory: 1Gi

postgresql:
  replicaCount: 1
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  storage:
    storageClassName: standard
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

marketData:
  storage:
    storageClassName: standard
    size: 20Gi

config:
  appEnv: local-kubernetes
  logLevel: INFO
  secUserAgent: "Stock Intelligence local research admin@example.invalid"
  # Empty means the eligible exchange universe is processed in resumable batches.
  analysisSymbols: ""
  analysisBatchSize: 500
  analysisRetryHours: 6
  analysisWorkers: 4
  # Re-analyze each security roughly every 8h so the deep model keeps running
  # non-stop rather than idling once the universe is covered.
  analysisRefreshHours: 8
  analysisLoopDelaySeconds: 5
  analysisIdleSeconds: 300
  universeRefreshHours: 24
  analysisExchanges: "Nasdaq,NYSE,NYSE American,NYSE Arca,Cboe BZX"
  # Fast intraday price loop — refreshes current price / 1D move far more often
  # than the deep loop so the screener updates near-live during market hours.
  liveQuotesEnabled: true
  liveQuoteIntervalSeconds: 45
  liveQuoteOffhoursSeconds: 900
  liveQuoteBatchSize: 240
  liveQuoteChunkSize: 40
  liveFreshSeconds: 180
  # Run the analyzer loops inside the backend so scanning never stops. If you run
  # a dedicated continuous-analyzer pod instead, set backendRunDeepLoop false.
  backendRunLiveLoop: true
  backendRunDeepLoop: true

secrets:
  # For GitOps, create this Secret out-of-band and set existingSecret.
  existingSecret: ""
  createPlaceholder: true
  postgresUser: stock_app
  postgresPassword: REPLACE_ME
  postgresDatabase: stock_intelligence

gateway:
  enabled: true
  classNamespace: istio-system
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: istio-gateway
    namespace: istio-system
    sectionName: https
  additionalParentRefs: []
  hostnames:
    - stock-intelligence.localhost

networkPolicy:
  enabled: true
  gatewayNamespace: istio-system

dailyPipeline:
  enabled: false
  # Frequent resumable batches build initial coverage, then refresh the oldest analyses.
  schedule: "15 */2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: "1"
      memory: 1Gi

analyzer:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: "1"
      memory: 1Gi
