namespace:
  create: true
  name: stock-intelligence
  labels:
    app.kubernetes.io/part-of: stock-intelligence
  istioInjection: false

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/xmaeltht/stock-intelligent-frontend
    tag: "3e52b9392f819d2e90b899a4bd9bb48c46cfa6e3" # gitops-managed
    pullPolicy: IfNotPresent
    revision: "2026-07-13-06"
  service:
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/xmaeltht/stock-intelligent-backend
    tag: "3e52b9392f819d2e90b899a4bd9bb48c46cfa6e3" # gitops-managed
    pullPolicy: IfNotPresent
    revision: "2026-07-13-06"
  service:
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: "1"
      memory: 1Gi

postgresql:
  replicaCount: 1
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  storage:
    storageClassName: standard
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

marketData:
  storage:
    storageClassName: standard
    size: 20Gi

config:
  appEnv: local-kubernetes
  logLevel: INFO
  secUserAgent: "Stock Intelligence local research admin@example.invalid"
  # Empty means the eligible exchange universe is processed in resumable batches.
  analysisSymbols: ""
  analysisBatchSize: 500
  analysisRetryHours: 6
  analysisWorkers: 4
  # Re-analyze each security roughly every 8h so the deep model keeps running
  # non-stop rather than idling once the universe is covered.
  analysisRefreshHours: 8
  analysisLoopDelaySeconds: 5
  analysisIdleSeconds: 300
  universeRefreshHours: 24
  # Cap snapshots kept per company so the analyses table stays bounded.
  snapshotRetention: 60
  analysisExchanges: "Nasdaq,NYSE,NYSE American,NYSE Arca,Cboe BZX"
  # Fast intraday price loop — refreshes current price / 1D move far more often
  # than the deep loop so the screener updates near-live during market hours.
  liveQuotesEnabled: true
  liveQuoteIntervalSeconds: 45
  liveQuoteOvernightSeconds: 180
  liveQuoteOffhoursSeconds: 900
  liveQuoteBatchSize: 240
  liveQuoteChunkSize: 40
  liveFreshSeconds: 180
  # The dedicated analyzer Deployment owns both loops. Keeping them out of the
  # API prevents duplicate analysis, excess provider calls, and DB pool pressure.
  backendRunLiveLoop: false
  backendRunDeepLoop: false
  # Auth session cookie: require HTTPS (the site is served over TLS) and expire
  # after 30 days. The signing secret itself lives in the Secret below.
  sessionCookieSecure: true
  sessionTtlHours: 720
  # Billing (Stripe). Leave the price id empty to keep billing disabled; set it
  # plus the secret key below to enable Pro checkout. appBaseUrl builds redirects.
  stripePriceId: ""
  appBaseUrl: "https://stock-intelligence.maelkloud.com"
  # Email delivery of alerts (Pro). Set smtpHost + smtpFrom (and the SMTP_USER /
  # SMTP_PASSWORD secret) to turn on. Empty host keeps email off.
  smtpHost: ""
  smtpPort: 587
  smtpFrom: ""
  smtpUseTls: true
  # Google OAuth client id (public). Set this + the GOOGLE_CLIENT_SECRET secret to enable Google sign-in.
  googleClientId: ""

secrets:
  # For GitOps, create this Secret out-of-band and set existingSecret.
  existingSecret: ""
  createPlaceholder: true
  postgresUser: stock_app
  postgresPassword: REPLACE_ME
  postgresDatabase: stock_intelligence
  # HMAC key that signs auth session cookies. MUST be overridden with a long
  # random value before real use (e.g. `openssl rand -hex 32`).
  sessionSecret: REPLACE_ME_WITH_A_LONG_RANDOM_STRING
  # Stripe keys — fill these in (and stripePriceId above) to turn on Pro billing.
  stripeSecretKey: ""
  stripeWebhookSecret: ""
  # SMTP auth for alert emails (leave empty to keep email off).
  smtpUser: ""
  smtpPassword: ""
  # Google OAuth client secret.
  googleClientSecret: ""

gateway:
  enabled: true
  classNamespace: istio-system
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: istio-gateway
    namespace: istio-system
    sectionName: https
  additionalParentRefs: []
  hostnames:
    - stock-intelligence.localhost

networkPolicy:
  enabled: true
  gatewayNamespace: istio-system

dailyPipeline:
  enabled: false
  # Frequent resumable batches build initial coverage, then refresh the oldest analyses.
  schedule: "15 */2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: "1"
      memory: 1Gi

analyzer:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: "1"
      memory: 1Gi
