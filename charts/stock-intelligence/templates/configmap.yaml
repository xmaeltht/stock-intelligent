apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stock-intelligence.fullname" . }}-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "stock-intelligence.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.config.appEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  POSTGRES_HOST: {{ include "stock-intelligence.fullname" . }}-postgres
  POSTGRES_PORT: "5432"
  BACKEND_URL: http://{{ include "stock-intelligence.fullname" . }}-backend:{{ .Values.backend.service.port }}
  MARKET_DATA_PATH: /data/market
  SEC_USER_AGENT: {{ .Values.config.secUserAgent | quote }}
  ANALYSIS_SYMBOLS: {{ .Values.config.analysisSymbols | quote }}
  ANALYSIS_BATCH_SIZE: {{ .Values.config.analysisBatchSize | quote }}
  ANALYSIS_RETRY_HOURS: {{ .Values.config.analysisRetryHours | quote }}
  ANALYSIS_WORKERS: {{ .Values.config.analysisWorkers | quote }}
  ANALYSIS_REFRESH_HOURS: {{ .Values.config.analysisRefreshHours | quote }}
  ANALYSIS_LOOP_DELAY_SECONDS: {{ .Values.config.analysisLoopDelaySeconds | quote }}
  ANALYSIS_IDLE_SECONDS: {{ .Values.config.analysisIdleSeconds | quote }}
  UNIVERSE_REFRESH_HOURS: {{ .Values.config.universeRefreshHours | quote }}
  SNAPSHOT_RETENTION: {{ .Values.config.snapshotRetention | quote }}
  ANALYSIS_EXCHANGES: {{ .Values.config.analysisExchanges | quote }}
  LIVE_QUOTES_ENABLED: {{ .Values.config.liveQuotesEnabled | quote }}
  LIVE_QUOTE_INTERVAL_SECONDS: {{ .Values.config.liveQuoteIntervalSeconds | quote }}
  LIVE_QUOTE_OVERNIGHT_SECONDS: {{ .Values.config.liveQuoteOvernightSeconds | quote }}
  LIVE_QUOTE_OFFHOURS_SECONDS: {{ .Values.config.liveQuoteOffhoursSeconds | quote }}
  LIVE_QUOTE_BATCH_SIZE: {{ .Values.config.liveQuoteBatchSize | quote }}
  LIVE_QUOTE_CHUNK_SIZE: {{ .Values.config.liveQuoteChunkSize | quote }}
  LIVE_FRESH_SECONDS: {{ .Values.config.liveFreshSeconds | quote }}
  BACKEND_RUN_LIVE_LOOP: {{ .Values.config.backendRunLiveLoop | quote }}
  BACKEND_RUN_DEEP_LOOP: {{ .Values.config.backendRunDeepLoop | quote }}
  SESSION_COOKIE_SECURE: {{ .Values.config.sessionCookieSecure | quote }}
  SESSION_TTL_HOURS: {{ .Values.config.sessionTtlHours | quote }}
  STRIPE_PRICE_ID: {{ .Values.config.stripePriceId | quote }}
  APP_BASE_URL: {{ .Values.config.appBaseUrl | quote }}
