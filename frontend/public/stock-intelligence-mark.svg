<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Stock Intelligence</title>
  <desc id="desc">A rising market signal crossing an intelligence pulse</desc>
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3578FF"/>
      <stop offset="0.52" stop-color="#4D5DDE"/>
      <stop offset="1" stop-color="#14CFA0"/>
    </linearGradient>
    <linearGradient id="line" x1="15" y1="45" x2="49" y2="18" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BDE1FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="17" fill="url(#bg)"/>
  <path d="M11 40.5h8l4-9 7 17 7-25 5 12h11" fill="none" stroke="#DFF8FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".5"/>
  <path d="M15 46 25 37l7 5 17-22" fill="none" stroke="url(#line)" stroke-width="4.25" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="m42 20 8-1-1 8" fill="none" stroke="#fff" stroke-width="4.25" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="25" cy="37" r="3" fill="#72F1C5" stroke="#fff" stroke-width="1.5"/>
  <rect x=".75" y=".75" width="62.5" height="62.5" rx="16.25" fill="none" stroke="#fff" stroke-opacity=".24" stroke-width="1.5"/>
</svg>
