{{- range $component := list "frontend" "backend" "pipeline" "postgres" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "stock-intelligence.fullname" $ }}-{{ $component }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    {{- include "stock-intelligence.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
automountServiceAccountToken: false
{{- end }}

