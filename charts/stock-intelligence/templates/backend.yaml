apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stock-intelligence.fullname" . }}-backend
  namespace: {{ .Values.namespace.name }}
  annotations:
    # Base resources/PostgreSQL are wave 0. The API owns schema migration and
    # must become healthy before the analyzer is allowed to start.
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "stock-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  # A rolling update leaves the old, query-heavy API alive while the new pod's
  # migration waits for database locks. Recreate gives migrations a quiet,
  # deterministic window; one local-user replica makes the brief gap acceptable.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "stock-intelligence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "stock-intelligence.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        stock-intelligence.local/image-revision: {{ .Values.backend.image.revision | quote }}
    spec:
      serviceAccountName: {{ include "stock-intelligence.fullname" . }}-backend
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: migrate
          image: {{ include "stock-intelligence.backendImage" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: {{ include "stock-intelligence.fullname" . }}-config
            - secretRef:
                name: {{ include "stock-intelligence.secretName" . }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsUser: 10001
            runAsGroup: 10001
      containers:
        - name: backend
          image: {{ include "stock-intelligence.backendImage" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "stock-intelligence.fullname" . }}-config
            - secretRef:
                name: {{ include "stock-intelligence.secretName" . }}
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsUser: 10001
            runAsGroup: 10001
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stock-intelligence.fullname" . }}-backend
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "stock-intelligence.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    {{- include "stock-intelligence.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
