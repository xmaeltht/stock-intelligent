name: Build and publish images

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    # Skip runs triggered by this workflow's own tag-bump commit.
    if: "${{ !startsWith(github.event.head_commit.message, 'ci-update-image-tags') }}"
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}-backend:latest
          cache-from: type=gha,scope=backend-v2
          cache-to: type=gha,scope=backend-v2,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Point the chart at the new image tags
        run: |
          sed -E -i 's|(tag: ").*(" # gitops-managed)|\1'"${GITHUB_SHA}"'\2|' \
            charts/stock-intelligence/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/stock-intelligence/values.yaml
          git commit -m "ci-update-image-tags ${GITHUB_SHA}"
          git push
